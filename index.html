<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NepalSky — Live Airspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --border:#E3E7EC;
  --text:#1A2330;
  --text-muted:#6B7785;
  --accent:#3D5A80;
  --accent-soft:#EAF0F6;
  --feasible:#2E7D5B;
  --marginal:#F2A900;
  --infeasible:#C4453C;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html,body{ height:100%; overflow:hidden; }
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}

/* topbar */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  z-index:1000;
}
.topbar h1{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:18px;
  letter-spacing:-0.01em;
}
.topbar h1 span{ color:var(--accent); }
.topbar-left{ display:flex; align-items:center; gap:10px; }
.topbar-right{ display:flex; align-items:center; gap:12px; }

.status-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:500;
  color:var(--text-muted);
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:99px;
  padding:3px 9px;
}
.status-dot{
  width:7px; height:7px;
  border-radius:50%;
  background:#ccc;
  transition:background 0.3s;
}
.status-dot.live{ background:var(--feasible); }
.status-dot.loading{ background:var(--marginal); animation:pulse 1s infinite; }
.status-dot.error{ background:var(--infeasible); }
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.35} }

.stat-chip{ text-align:right; }
.stat-chip .num{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:15px;
  line-height:1;
}
.stat-chip .lbl{
  font-size:10px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.07em;
}
.divider-v{ width:1px; height:26px; background:var(--border); }

.refresh-btn{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:500;
  font-family:'Inter',sans-serif;
  color:var(--accent);
  background:var(--accent-soft);
  border:1px solid transparent;
  border-radius:8px;
  padding:5px 11px;
  cursor:pointer;
  transition:background 0.15s;
}
.refresh-btn:hover{ background:#dce8f4; border-color:var(--accent); }
.refresh-btn svg{ width:13px; height:13px; }

/* error */
.error-banner{
  display:none;
  background:#FEF2F2;
  border-bottom:1px solid #FCA5A5;
  padding:7px 16px;
  font-size:12px;
  color:#B91C1C;
  flex-shrink:0;
}

/* body layout */
.layout{
  display:flex;
  flex:1;
  min-height:0;
}
#map{
  flex:1;
  min-width:0;
}

/* side panel */
.panel{
  width:280px;
  flex-shrink:0;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  min-height:0;
}
.panel-hdr{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.panel-hdr h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--text-muted);
}
.panel-body{
  flex:1;
  overflow-y:auto;
  padding:10px;
  min-height:0;
}
.panel-body::-webkit-scrollbar{ width:3px; }
.panel-body::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }

.next-refresh{
  padding:9px 16px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
}
.next-refresh span{ font-size:11px; color:var(--text-muted); }
.countdown{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  font-weight:600;
  color:var(--accent);
}

/* empty */
.empty{
  padding:28px 12px;
  text-align:center;
  color:var(--text-muted);
  font-size:12px;
  line-height:1.6;
}
.empty svg{ width:32px; height:32px; color:var(--border); margin-bottom:10px; display:block; margin-left:auto; margin-right:auto; }

/* flight card */
.flight-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:9px;
  padding:12px;
  margin-bottom:7px;
  cursor:pointer;
  transition:border-color 0.15s, transform 0.12s;
}
.flight-card:hover, .flight-card.active{
  border-color:var(--accent);
  transform:translateX(2px);
}
.flight-card.active{ background:var(--accent-soft); }

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:9px;
}
.callsign{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:14px;
}
.origin-tag{
  font-size:10px;
  color:var(--text-muted);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  padding:2px 5px;
  font-weight:500;
}
.card-metrics{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.card-metric .val{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  font-weight:600;
  color:var(--accent);
}
.card-metric .lbl{
  font-size:10px;
  color:var(--text-muted);
  margin-top:1px;
}

/* popup */
.ns-popup{ padding:14px; min-width:200px; }
.ns-popup-cs{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:15px;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.ns-popup-row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  padding:2px 0;
}
.ns-popup-row .k{ color:var(--text-muted); }
.ns-popup-row .v{
  font-family:'IBM Plex Mono',monospace;
  font-weight:600;
  font-size:11px;
}

/* leaflet popup override */
.leaflet-popup-content-wrapper{
  border-radius:10px !important;
  box-shadow:0 4px 20px rgba(26,35,48,0.12) !important;
  border:1px solid var(--border) !important;
  padding:0 !important;
}
.leaflet-popup-content{ margin:0 !important; }
.leaflet-popup-tip-container{ display:none !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>Nepal<span>Sky</span></h1>
    <div class="status-pill">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="stat-chip">
      <div class="num" id="planeCount">—</div>
      <div class="lbl">Aircraft</div>
    </div>
    <div class="divider-v"></div>
    <div class="stat-chip">
      <div class="num" id="utcClock">—</div>
      <div class="lbl">UTC</div>
    </div>
    <div class="divider-v"></div>
    <button class="refresh-btn" id="refreshBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="layout">
  <div id="map"></div>
  <div class="panel">
    <div class="panel-hdr"><h2>Aircraft in Nepali Airspace</h2></div>
    <div class="panel-body" id="flightList">
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Loading…
      </div>
    </div>
    <div class="next-refresh">
      <span>Next refresh in</span>
      <span class="countdown" id="countdown">—</span>
    </div>
  </div>
</div>

<!-- Leaflet from cdnjs (reliable) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ── CONFIG — fill OPENSKY_PASS locally, never push to GitHub ── */
const OPENSKY_USER = '';
const OPENSKY_PASS = '';
const REFRESH_SEC  = 60;
const BOUNDS = { lamin:26.3, lamax:30.5, lomin:80.0, lomax:88.2 };

/* ── Map ── */
const map = L.map('map',{ center:[28.0,84.0], zoom:7 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

/* ── State ── */
let markers = {}, flights = [], activeIcao = null, cdTimer = null, cdVal = REFRESH_SEC;

/* ── UTC clock ── */
function tickClock(){
  const n = new Date();
  document.getElementById('utcClock').textContent =
    String(n.getUTCHours()).padStart(2,'0')+':'+String(n.getUTCMinutes()).padStart(2,'0');
}
setInterval(tickClock,1000); tickClock();

/* ── Countdown ── */
function startCountdown(){
  clearInterval(cdTimer); cdVal = REFRESH_SEC;
  document.getElementById('countdown').textContent = cdVal+'s';
  cdTimer = setInterval(()=>{
    cdVal--;
    document.getElementById('countdown').textContent = cdVal+'s';
    if(cdVal<=0){ clearInterval(cdTimer); fetchFlights(); }
  },1000);
}

/* ── Plane icon ── */
function planeIcon(hdg){
  const r = hdg||0;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
    <g transform="rotate(${r},14,14)">
      <circle cx="14" cy="14" r="13" fill="white" stroke="#E3E7EC" stroke-width="1.5"/>
      <g transform="translate(14,14)" fill="#3D5A80">
        <polygon points="0,-8 2,-1 0,1 -2,-1"/>
        <polygon points="-6,0 6,0 4,3 -4,3"/>
        <polygon points="-2.5,4 2.5,4 2,6 -2,6"/>
      </g>
    </g></svg>`;
  return L.divIcon({ html:svg, className:'', iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16] });
}

/* ── Popup HTML ── */
function popupHTML(f){
  const alt = f.alt!=null ? f.alt+'m / '+Math.round(f.alt*3.281)+'ft' : '—';
  const spd = f.spd!=null ? f.spd+' km/h' : '—';
  return `<div class="ns-popup">
    <div class="ns-popup-cs">${f.callsign}</div>
    <div class="ns-popup-row"><span class="k">ICAO24</span><span class="v">${f.icao24}</span></div>
    <div class="ns-popup-row"><span class="k">Origin</span><span class="v">${f.origin}</span></div>
    <div class="ns-popup-row"><span class="k">Altitude</span><span class="v">${alt}</span></div>
    <div class="ns-popup-row"><span class="k">Speed</span><span class="v">${spd}</span></div>
    <div class="ns-popup-row"><span class="k">Heading</span><span class="v">${f.hdg}°</span></div>
    <div class="ns-popup-row"><span class="k">Squawk</span><span class="v">${f.squawk}</span></div>
    <div class="ns-popup-row"><span class="k">On ground</span><span class="v">${f.gnd?'Yes':'No'}</span></div>
  </div>`;
}

/* ── Parse OpenSky state vector ── */
function parseState(s){
  return {
    icao24:   s[0],
    callsign: (s[1]||'').trim()||'UNKNOWN',
    origin:   s[2]||'—',
    lon:      s[5],
    lat:      s[6],
    alt:      s[7]!=null ? Math.round(s[7]) : null,
    gnd:      s[8],
    spd:      s[9]!=null ? Math.round(s[9]*3.6) : null,
    hdg:      s[10]!=null ? Math.round(s[10]) : 0,
    squawk:   s[14]||'—'
  };
}

/* ── Render markers ── */
function renderMarkers(){
  const cur = new Set(flights.map(f=>f.icao24));
  Object.keys(markers).forEach(id=>{ if(!cur.has(id)){ map.removeLayer(markers[id]); delete markers[id]; }});
  flights.forEach(f=>{
    const pop = popupHTML(f);
    if(markers[f.icao24]){
      markers[f.icao24].setLatLng([f.lat,f.lon]).setIcon(planeIcon(f.hdg)).setPopupContent(pop);
    } else {
      const m = L.marker([f.lat,f.lon],{icon:planeIcon(f.hdg)})
        .bindPopup(pop,{maxWidth:240,className:'ns-leaflet-popup'})
        .addTo(map);
      m.on('click',()=>selectFlight(f.icao24));
      markers[f.icao24]=m;
    }
  });
}

/* ── Render list ── */
function renderList(){
  const el = document.getElementById('flightList');
  if(!flights.length){
    el.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>No aircraft detected in Nepali airspace right now.</div>`;
    return;
  }
  el.innerHTML = flights.map(f=>`
    <div class="flight-card${f.icao24===activeIcao?' active':''}" onclick="selectFlight('${f.icao24}')">
      <div class="card-top">
        <div class="callsign">${f.callsign}</div>
        <div class="origin-tag">${f.origin}</div>
      </div>
      <div class="card-metrics">
        <div class="card-metric"><div class="val">${f.alt!=null?f.alt+'m':'—'}</div><div class="lbl">Altitude</div></div>
        <div class="card-metric"><div class="val">${f.spd!=null?f.spd:'—'}<span style="font-size:9px;font-family:Inter;color:var(--text-muted)"> km/h</span></div><div class="lbl">Speed</div></div>
        <div class="card-metric"><div class="val">${f.hdg}°</div><div class="lbl">Heading</div></div>
        <div class="card-metric"><div class="val">${f.gnd?'GND':'AIR'}</div><div class="lbl">Status</div></div>
      </div>
    </div>`).join('');
}

/* ── Select flight ── */
function selectFlight(icao24){
  activeIcao=icao24;
  renderList();
  const f=flights.find(f=>f.icao24===icao24);
  if(f&&markers[icao24]){ map.setView([f.lat,f.lon],Math.max(map.getZoom(),8)); markers[icao24].openPopup(); }
}

/* ── Status ── */
function setStatus(state,text){
  document.getElementById('statusDot').className='status-dot '+state;
  document.getElementById('statusText').textContent=text;
}
function showError(msg){ const b=document.getElementById('errorBanner'); b.textContent=msg; b.style.display='block'; }
function hideError(){ document.getElementById('errorBanner').style.display='none'; }

/* ── Demo fallback ── */
function demoStates(){
  return [
    ['abc001','RAF4531 ','NP',null,null,85.30,27.70,8534,false,245*0.2778,125,null,null,null,'2045'],
    ['abc002','QR641   ','QA',null,null,84.10,28.40,11280,false,890*0.2778,270,null,null,null,'1234'],
    ['abc003','AI218   ','IN',null,null,83.50,27.20,10060,false,820*0.2778,315,null,null,null,'5566'],
    ['abc004','9NAKQ   ','NP',null,null,85.37,27.69,1200,false,180*0.2778,90,null,null,null,'7700'],
    ['abc005','TK718   ','TR',null,null,86.90,28.10,11900,false,910*0.2778,260,null,null,null,'2131'],
  ];
}

/* ── Fetch ── */
async function fetchFlights(){
  setStatus('loading','Fetching…');
  hideError();
  const {lamin,lamax,lomin,lomax}=BOUNDS;
  const url = https://api.allorigins.win/raw?url=`+encodeURIComponent(https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`);
const res = await fetch(url);
  try{
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    flights=(data.states||[]).map(parseState).filter(f=>f.lat&&f.lon);
    setStatus('live','Live');
    hideError();
  } catch(e){
    setStatus('error','Error — demo data');
    showError('OpenSky unreachable ('+e.message+'). Showing demo aircraft.');
    flights=demoStates().map(parseState).filter(f=>f.lat&&f.lon);
  }
  document.getElementById('planeCount').textContent=flights.length;
  renderMarkers();
  renderList();
  startCountdown();
}

document.getElementById('refreshBtn').addEventListener('click',fetchFlights);

/* ── Boot ── */
fetchFlights();
</script>
</body>
</html>
